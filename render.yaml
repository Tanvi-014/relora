services:
  - type: web
    name: relora-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    startCommand: sh -c "cd /app/backend && alembic upgrade head && uvicorn app.api_main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: ALLOW_PRIVATE_DESTINATIONS
        value: "false"
      - key: FORCE_HTTPS
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: WORKER_CONCURRENCY
        value: "3"
      - key: DEFAULT_MAX_RETRIES
        value: "5"
      - key: BACKOFF_BASE_SECONDS
        value: "30"
      - key: HTTP_CLIENT_TIMEOUT_SECONDS
        value: "10"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MONTHLY_EVENT_QUOTA
        value: "0"
      - key: ENABLE_SIMULATOR
        value: "false"
      - key: ENABLE_AI_FEATURES
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      # Set these in the Render dashboard after connecting your Neon DB
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: INTERNAL_API_URL
        fromService:
          type: web
          name: relora-api
          property: url

  - type: worker
    name: relora-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    startCommand: python -m app.worker_main
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOW_PRIVATE_DESTINATIONS
        value: "false"
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "1"
      - key: DEFAULT_MAX_RETRIES
        value: "5"
      - key: BACKOFF_BASE_SECONDS
        value: "30"
      - key: HTTP_CLIENT_TIMEOUT_SECONDS
        value: "10"
      - key: ENABLE_AI_FEATURES
        value: "false"
      # Set this in the Render dashboard after connecting your Neon DB
      - key: DATABASE_URL
        sync: false
