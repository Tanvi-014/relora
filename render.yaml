services:
  - type: web
    name: relora
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relora-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: relora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: ALLOW_PRIVATE_DESTINATIONS
        value: "false"

databases:
  - name: relora-db
    plan: free
