server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Static assets — no aggressive caching in dev
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Proxy API calls to hermes-api
    location /api/ {
        proxy_pass http://hermes-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket upgrade for real-time dashboard
    location /ws/ {
        proxy_pass http://hermes-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Prometheus metrics proxy
    location /metrics {
        proxy_pass http://hermes-api:8000;
        proxy_set_header Host $host;
    }

    # Health check proxy
    location /health {
        proxy_pass http://hermes-api:8000;
        proxy_set_header Host $host;
    }

    # Auth endpoints
    location /auth/ {
        proxy_pass http://hermes-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
