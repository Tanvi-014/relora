services:
  postgres:
    image: postgres:16-alpine
    container_name: relora-postgres
    environment:
      POSTGRES_USER: relora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reloradev}
      POSTGRES_DB: relora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relora -d relora"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: relora-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      relora-api:
        condition: service_healthy

  relora-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-migrate
    command: sh -c "cd /app/backend && alembic upgrade head"
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
      SYNC_DATABASE_URL: postgresql://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  relora-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-api
    command: uvicorn app.api_main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
      SYNC_DATABASE_URL: postgresql://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AUTO_CREATE_TABLES: "false"
      ALLOW_PRIVATE_DESTINATIONS: ${ALLOW_PRIVATE_DESTINATIONS:-false}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      DEFAULT_MAX_RETRIES: ${DEFAULT_MAX_RETRIES:-5}
      BACKOFF_BASE_SECONDS: ${BACKOFF_BASE_SECONDS:-30}
      HTTP_CLIENT_TIMEOUT_SECONDS: ${HTTP_CLIENT_TIMEOUT_SECONDS:-10}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      MONTHLY_EVENT_QUOTA: ${MONTHLY_EVENT_QUOTA:-0}
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      RELORA_API_KEY: ${RELORA_API_KEY:-}
      RELORA_API_KEYS: ${RELORA_API_KEYS:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      RELORA_WEBHOOK_SECRET: ${RELORA_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_AI_FEATURES: ${ENABLE_AI_FEATURES:-false}
      ENABLE_SIMULATOR: "true"
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - ./backend:/workspace/backend:ro
      - ./frontend:/workspace/frontend:ro
    depends_on:
      relora-migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  relora-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-worker
    command: python -m app.worker_main
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD-SHELL", "python -c \"s=open('/proc/1/stat').read().split(); state=s[2]; exit(1 if state in ('Z','D','X') else 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_POLL_INTERVAL_SECONDS: "1"
      DEFAULT_MAX_RETRIES: ${DEFAULT_MAX_RETRIES:-5}
      BACKOFF_BASE_SECONDS: ${BACKOFF_BASE_SECONDS:-30}
      HTTP_CLIENT_TIMEOUT_SECONDS: ${HTTP_CLIENT_TIMEOUT_SECONDS:-10}
      ALLOW_PRIVATE_DESTINATIONS: ${ALLOW_PRIVATE_DESTINATIONS:-false}
      STANDARD_WEBHOOKS_SECRET: ${STANDARD_WEBHOOKS_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_AI_FEATURES: ${ENABLE_AI_FEATURES:-false}
    depends_on:
      relora-migrate:
        condition: service_completed_successfully

  downstream:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-downstream
    command: uvicorn scripts.fake_downstream:app --host 0.0.0.0 --port 9000
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD:-reloradev}@postgres:5432/relora
    volumes:
      - ./backend:/workspace/backend:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
