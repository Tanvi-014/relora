app = "relora-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  AUTO_CREATE_TABLES = "false"
  ALLOW_PRIVATE_DESTINATIONS = "false"
  FORCE_HTTPS = "true"
  COOKIE_SECURE = "true"
  WORKER_CONCURRENCY = "5"
  DEFAULT_MAX_RETRIES = "5"
  BACKOFF_BASE_SECONDS = "30"
  HTTP_CLIENT_TIMEOUT_SECONDS = "10"
  RATE_LIMIT_PER_MINUTE = "60"
  MONTHLY_EVENT_QUOTA = "0"
  ENABLE_SIMULATOR = "false"
  ENABLE_AI_FEATURES = "false"

# Secrets — set via: fly secrets set JWT_SECRET=... DATABASE_URL=... SYNC_DATABASE_URL=...
# Required: JWT_SECRET, DATABASE_URL, SYNC_DATABASE_URL
# Optional: ANTHROPIC_API_KEY (set ENABLE_AI_FEATURES=true to use)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
