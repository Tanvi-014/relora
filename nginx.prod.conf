# ── Relora Production Nginx Configuration ─────────────────────────────────────
#
# Prerequisites:
#   1. Obtain TLS certificates (e.g. via Certbot / Let's Encrypt):
#      certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
#   2. Replace every occurrence of "yourdomain.com" with your actual domain.
#   3. Mount certs into the nginx container (see docker-compose.production.yml).
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones (defined outside server blocks) ───────────────────────
# General API limit — per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m    rate=30r/s;
# Strict limit for auth endpoints — prevent brute-force
limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=5r/m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # Content Security Policy — tightened for the dashboard SPA
    # If you load fonts or scripts from CDNs, add their origins here.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src  'self' 'unsafe-inline'; "
        "style-src   'self' 'unsafe-inline'; "
        "img-src     'self' data:; "
        "font-src    'self'; "
        "connect-src 'self' wss://yourdomain.com; "
        "frame-ancestors 'none';"
        always;

    root /usr/share/nginx/html;
    index index.html;

    # ── Body size (mirrors the API-level 1 MB guard) ──────────────────────────
    client_max_body_size 2m;

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://relora-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Auth — stricter rate limit ─────────────────────────────────────────────
    location ~ ^/api/v1/auth/(register|login) {
        limit_req zone=auth_zone burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://relora-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://relora-api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Prometheus metrics — internal networks only ───────────────────────────
    location /metrics {
        proxy_pass http://relora-api:8000;
        proxy_set_header Host $host;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
    }

    location /health {
        proxy_pass http://relora-api:8000;
        proxy_set_header Host $host;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
