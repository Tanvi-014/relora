global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    service: relora

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: relora-api
    static_configs:
      - targets: ["relora-api:8000"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
