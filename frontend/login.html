<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:32px;margin-bottom:8px">⚡</div>
      <div class="auth-logo-text">Hermes</div>
      <div class="auth-logo-sub">Webhook Delivery Middleware</div>
    </div>
    <div class="auth-form-title">Sign in</div>
    <div class="auth-form-sub">Welcome back. Enter your credentials.</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="input" type="email" id="email" placeholder="you@company.com" required autofocus>
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px" id="login-btn">Sign in</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Register</a>
    </div>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
