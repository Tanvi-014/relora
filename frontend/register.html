<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes — Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:32px;margin-bottom:8px">⚡</div>
      <div class="auth-logo-text">Hermes</div>
      <div class="auth-logo-sub">Webhook Delivery Middleware</div>
    </div>
    <div class="auth-form-title">Create an account</div>
    <div class="auth-form-sub">Start delivering webhooks reliably.</div>
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="input" type="email" id="email" placeholder="you@company.com" required autofocus>
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="input" type="password" id="password" placeholder="Min 8 characters" required minlength="8">
      </div>
      <div id="register-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:10px" id="register-btn">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
