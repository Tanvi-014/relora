<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relora — Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:32px;margin-bottom:8px">⚡</div>
      <div class="auth-logo-text">Relora</div>
      <div class="auth-logo-sub">Webhook Delivery Middleware</div>
    </div>

    <!-- Request form (shown when no token in URL) -->
    <div id="state-request">
      <div class="auth-form-title">Forgot password</div>
      <div class="auth-form-sub" style="margin-bottom:20px">
        Enter your email address and we'll send you a reset link.
      </div>
      <form id="request-form" onsubmit="handleRequest(event)">
        <div class="input-group">
          <label class="input-label">Email address</label>
          <input class="input" type="email" id="request-email"
                 placeholder="you@company.com" required autofocus>
        </div>
        <div id="request-msg" style="font-size:13px;margin:8px 0;display:none"></div>
        <button type="submit" class="btn btn-primary"
                style="width:100%;margin-top:12px;padding:10px" id="request-btn">
          Send reset link
        </button>
      </form>
      <a href="/login.html" style="display:block;text-align:center;margin-top:16px;
                                    font-size:13px;color:var(--text3);text-decoration:none">
        Back to sign in
      </a>
    </div>

    <!-- Reset form (shown when token is in URL) -->
    <div id="state-reset" style="display:none">
      <div class="auth-form-title">Set new password</div>
      <div class="auth-form-sub" style="margin-bottom:20px">
        Choose a new password for your account.
      </div>
      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="input-group">
          <label class="input-label">New password</label>
          <input class="input" type="password" id="new-password"
                 placeholder="Minimum 8 characters" required minlength="8" autofocus>
        </div>
        <div class="input-group" style="margin-top:12px">
          <label class="input-label">Confirm password</label>
          <input class="input" type="password" id="confirm-password"
                 placeholder="Re-enter new password" required minlength="8">
        </div>
        <div id="reset-msg" style="font-size:13px;margin:8px 0;display:none"></div>
        <button type="submit" class="btn btn-primary"
                style="width:100%;margin-top:12px;padding:10px" id="reset-btn">
          Set new password
        </button>
      </form>
    </div>

    <!-- Success -->
    <div id="state-success" style="display:none;text-align:center">
      <div style="font-size:40px;margin-bottom:16px">✓</div>
      <div class="auth-form-title">Password updated</div>
      <div class="auth-form-sub" style="margin-bottom:24px">
        Your password has been changed successfully.
      </div>
      <a href="/login.html" class="btn btn-primary"
         style="display:inline-block;padding:10px 24px;text-decoration:none">
        Sign in
      </a>
    </div>
  </div>
</div>

<script>
'use strict';

function show(id) {
  ['state-request', 'state-reset', 'state-success'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

function setMsg(id, text, isError) {
  const el = document.getElementById(id);
  el.style.color = isError ? 'var(--danger)' : 'var(--success)';
  el.textContent = text;
  el.style.display = 'block';
}

async function handleRequest(e) {
  e.preventDefault();
  const btn = document.getElementById('request-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  document.getElementById('request-msg').style.display = 'none';

  try {
    const res = await fetch('/api/v1/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('request-email').value }),
    });
    const j = await res.json().catch(() => ({}));
    if (res.ok) {
      setMsg('request-msg', j.message || 'Reset link sent — check your inbox.', false);
    } else {
      setMsg('request-msg', j.detail || 'Failed to send reset link. Try again.', true);
    }
  } catch {
    setMsg('request-msg', 'Network error. Is the server running?', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

async function handleReset(e) {
  e.preventDefault();
  const newPw  = document.getElementById('new-password').value;
  const confPw = document.getElementById('confirm-password').value;
  if (newPw !== confPw) {
    setMsg('reset-msg', 'Passwords do not match.', true);
    return;
  }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  document.getElementById('reset-msg').style.display = 'none';

  const token = new URLSearchParams(window.location.search).get('token');
  try {
    const res = await fetch('/api/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: newPw }),
    });
    const j = await res.json().catch(() => ({}));
    if (res.ok) {
      show('state-success');
    } else {
      setMsg('reset-msg', j.detail || 'Failed to reset password. The link may have expired.', true);
      btn.disabled = false;
      btn.textContent = 'Set new password';
    }
  } catch {
    setMsg('reset-msg', 'Network error. Is the server running?', true);
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}

// On load: if a token is in the URL, show the reset form; otherwise show the request form.
(function () {
  const token = new URLSearchParams(window.location.search).get('token');
  show(token ? 'state-reset' : 'state-request');
})();
</script>
</body>
</html>
