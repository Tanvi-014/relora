# ── Relora Production Docker Compose ─────────────────────────────────────────
#
# Before first deploy:
#   1. Copy .env.example to .env and fill in every value.
#   2. Set your domain:  export DOMAIN=yourdomain.com
#   3. Obtain TLS certs: docker-compose -f docker-compose.production.yml run --rm certbot
#      (then switch certbot entrypoint back to renewal loop)
#   4. docker-compose -f docker-compose.production.yml up -d
#
# Required env vars (in .env or shell):
#   DOMAIN              your-domain.com
#   POSTGRES_PASSWORD   strong random password
#   JWT_SECRET          openssl rand -hex 32
#   RELORA_API_KEY      project key for programmatic access (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: relora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: relora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: relora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relora -d relora"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Migrations (one-shot) ───────────────────────────────────────────────────
  relora-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-migrate
    command: sh -c "cd /app/backend && alembic upgrade head"
    environment:
      SYNC_DATABASE_URL: postgresql://relora:${POSTGRES_PASSWORD}@postgres:5432/relora
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD}@postgres:5432/relora
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  # ── API ──────────────────────────────────────────────────────────────────────
  relora-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-api
    restart: unless-stopped
    command: uvicorn app.api_main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD}@postgres:5432/relora
      SYNC_DATABASE_URL: postgresql://relora:${POSTGRES_PASSWORD}@postgres:5432/relora
      ENVIRONMENT: production
      AUTO_CREATE_TABLES: "false"
      ALLOW_PRIVATE_DESTINATIONS: "false"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      DEFAULT_MAX_RETRIES: ${DEFAULT_MAX_RETRIES:-5}
      BACKOFF_BASE_SECONDS: ${BACKOFF_BASE_SECONDS:-30}
      HTTP_CLIENT_TIMEOUT_SECONDS: ${HTTP_CLIENT_TIMEOUT_SECONDS:-10}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-300}
      MONTHLY_EVENT_QUOTA: ${MONTHLY_EVENT_QUOTA:-0}
      # Auth — required
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: "true"
      FORCE_HTTPS: "true"
      COOKIE_DOMAIN: ${DOMAIN}
      # API keys
      RELORA_API_KEY: ${RELORA_API_KEY:-}
      RELORA_API_KEYS: ${RELORA_API_KEYS:-}
      # Webhooks
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      RELORA_WEBHOOK_SECRET: ${RELORA_WEBHOOK_SECRET:-}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@yourdomain.com}
      APP_BASE_URL: https://${DOMAIN}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      # SMS
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_AI_FEATURES: ${ENABLE_AI_FEATURES:-false}
    depends_on:
      relora-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  # ── Worker ───────────────────────────────────────────────────────────────────
  relora-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: relora-worker
    restart: unless-stopped
    command: python -m app.worker_main
    stop_grace_period: 60s
    environment:
      DATABASE_URL: postgresql+asyncpg://relora:${POSTGRES_PASSWORD}@postgres:5432/relora
      ENVIRONMENT: production
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_POLL_INTERVAL_SECONDS: "1"
      DEFAULT_MAX_RETRIES: ${DEFAULT_MAX_RETRIES:-5}
      BACKOFF_BASE_SECONDS: ${BACKOFF_BASE_SECONDS:-30}
      HTTP_CLIENT_TIMEOUT_SECONDS: ${HTTP_CLIENT_TIMEOUT_SECONDS:-10}
      ALLOW_PRIVATE_DESTINATIONS: "false"
      STANDARD_WEBHOOKS_SECRET: ${STANDARD_WEBHOOKS_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_AI_FEATURES: ${ENABLE_AI_FEATURES:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      relora-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"s=open('/proc/1/stat').read().split(); state=s[2]; exit(1 if state in ('Z','D','X') else 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  # ── Nginx + TLS ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: relora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      relora-api:
        condition: service_healthy
    networks:
      - internal

  # ── Certbot (TLS renewal loop) ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: relora-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renews every 12h; cert is only renewed when < 30 days remain
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  # ── PostgreSQL backup ─────────────────────────────────────────────────────────
  pg-backup:
    image: postgres:16-alpine
    container_name: relora-pg-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGUSER: relora
      PGDATABASE: relora
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    # Run a full backup every 24h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sh /backup.sh; sleep 86400 & wait $${!}; done'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: relora-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: relora-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - internal

  # ── Node exporter (host-level metrics) ───────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: relora-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal

  # ── Postgres exporter ─────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: relora-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://relora:${POSTGRES_PASSWORD}@postgres:5432/relora?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
